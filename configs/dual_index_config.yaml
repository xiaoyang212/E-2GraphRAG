dataset:
  dataset_name: InfiniteChoice                                  # or InfiniteQALoader, NovelQA.
  dataset_path: ./data/InfiniteBench/longbook_choice_eng.jsonl  # path to your dataset path. 
  # or NovelQA: ./data/NovelQA
  # or InfiniteQALoader: ./data/InfiniteBench/longbook_qa_eng.jsonl

llm:
  llm_name: Qwen2.5-7B-Instruct
  llm_path: path/to/your/llm/model  # path to your llm model.
  llm_device: cuda                  # device to run the llm.

paths:
  log_path: ./log                     # path to save the log.
  answer_path: ./answer/dual_index    # path to save the answer.
  cache_path: ./cache/dual_index      # path to save the cache.

extractor:
  language: "en"  # language of the extractor.
  method: "Spacy" # method of the extractor.

cluster:
  length: 1200  # length of each chunk.
  overlap: 100  # overlap of each chunk.
  merge_num: 5  # number of chunks to merge for summary tree.
  force_Reextract: False   # whether to force reextract the graph, ignoring the existed cache.

resume:
  resumeIndex: 0  # index of the resume.

retriever:
  kwargs:
    device: cuda                      # device to run the retriever.
    embedder: BAAI/bge-m3            # sentence encoder model for dual-index
    debug: True                       # whether to print the debug information.
    merge_num: 5                      # number of chunks to merge.
    overlap: 100                      # overlap of each chunk.
    tokenizer: path/to/your/tokenizer # path to your tokenizer.
    
    # Dual-Index specific parameters
    concept_top_k: 20                 # number of top concepts to retrieve in Path A
    sentence_top_k: 30                # number of top sentences to retrieve in Path A
    tree_top_k: 25                    # number of top tree nodes to retrieve in Path B
    concept_threshold: 0.6            # similarity threshold for concept matching
    
    # Concept graph construction parameters (used in dual_index_builder)
    min_tfidf_score: 0.1             # minimum TF-IDF score for concept extraction
    semantic_threshold: 0.7           # semantic similarity threshold for edge construction
    cooccurrence_threshold: 2         # co-occurrence threshold for edge construction
